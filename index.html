<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vivian's Flagship Gallery</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4/turn.min.js"></script>
    <style>
        :root { --cover-p: #4a3c31; --cover-s: #2e241d; --geom: linear-gradient(90deg, var(--cover-p) 50%, var(--cover-s) 50%); }
        body { margin: 0; background: #e5e5e7; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        
        .glass-header { position: absolute; top: 30px; left: 30px; padding: 15px 35px; border-radius: 20px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.3); font-weight: 700; color: #1d1d1f; cursor: pointer; z-index: 10; }
        .notebook-cover { width: 220px; height: 300px; border-radius: 20px; cursor: pointer; box-shadow: 0 30px 60px rgba(0,0,0,0.3); background: var(--geom); position: relative; transition: 0.3s; }
        .inner-name-tag { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; padding: 8px 0; text-align: center; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border-radius: 50px; color: #fff; font-size: 14px; cursor: pointer; }
        
        /* 設定面板：Salon 質感渲染 */
        #settings-panel { position: fixed; top: 0; right: -350px; width: 320px; height: 100%; background: #ffffff; z-index: 2000; padding: 40px; transition: 0.4s ease; box-shadow: -10px 0 30px rgba(0,0,0,0.1); overflow-y: auto; }
        #settings-panel.open { right: 0; }
        .geom-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; }
        .geom-btn { width: 45px; height: 45px; border-radius: 8px; cursor: pointer; border: 1px solid #eee; }
        .icon-btn { cursor: pointer; background: none; border: none; color: #333; padding: 15px; }
    </style>
</head>
<body>

    <div class="glass-header" onclick="renameGallery()">Vivian 的畫廊</div>
    <div style="position:absolute; top:35px; right:35px; z-index:10; cursor:pointer;" onclick="toggleSettings()"><i data-lucide="settings"></i></div>

    <div id="shelf" style="height:100vh; display:flex; justify-content:center; align-items:center;">
        <div class="notebook-cover" onclick="openBook()">
            <div class="inner-name-tag" id="album-name" onclick="event.stopPropagation(); renameGallery()">Vivian 的畫冊</div>
        </div>
    </div>

    <div style="position:fixed; bottom:40px; right:40px; width:60px; height:60px; background:#333; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="addNewBook()">
        <i data-lucide="plus" style="color:white;"></i>
    </div>

    <div id="settings-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-size:20px; margin:0;">畫廊設定</h2>
            <button class="icon-btn" onclick="toggleSettings()"><i data-lucide="chevron-right"></i></button>
        </div>
        
        <div class="panel-section">
            <div style="font-size:12px; color:#888;">封面幾何 (10種)</div>
            <div class="geom-grid">
                <div class="geom-btn" style="background:linear-gradient(90deg, #4a3c31 50%, #2e241d 50%)" onclick="updateGeom('split-v')"></div>
                <div class="geom-btn" style="background:linear-gradient(to bottom, #4a3c31 50%, #2e241d 50%)" onclick="updateGeom('split-h')"></div>
                <div class="geom-btn" style="background:linear-gradient(45deg, #4a3c31 50%, #2e241d 50%)" onclick="updateGeom('diag')"></div>
                <div class="geom-btn" style="background:radial-gradient(circle, #4a3c31 40%, #2e241d 100%)" onclick="updateGeom('radial')"></div>
                <div class="geom-btn" style="background:conic-gradient(#4a3c31, #2e241d)" onclick="updateGeom('conic')"></div>
                <div class="geom-btn" style="background:repeating-linear-gradient(45deg, #4a3c31, #4a3c31 10px, #2e241d 10px, #2e241d 20px)" onclick="updateGeom('stripes')"></div>
                <div class="geom-btn" style="background:radial-gradient(circle at 0% 0%, #4a3c31, #2e241d)" onclick="updateGeom('corner')"></div>
                <div class="geom-btn" style="background:linear-gradient(to top, #4a3c31 30%, #2e241d 70%)" onclick="updateGeom('vert')"></div>
                <div class="geom-btn" style="background:repeating-radial-gradient(circle, #4a3c31, #4a3c31 10px, #2e241d 10px, #2e241d 20px)" onclick="updateGeom('dots')"></div>
                <div class="geom-btn" style="background:linear-gradient(135deg, #4a3c31 25%, #2e241d 25%, #2e241d 50%, #4a3c31 50%)" onclick="updateGeom('check')"></div>
            </div>
            <input type="color" id="cp" value="#4a3c31" onchange="updateColors()">
            <input type="color" id="cs" value="#2e241d" onchange="updateColors()">
        </div>

        <div style="margin-top:20px;">
            <div style="font-size:12px; color:#888;">翻頁設定</div>
            <select id="mode" style="width:100%; margin:10px 0;"><option value="hard">物理翻書</option><option value="slide">平行滑動</option><option value="fade">淡入淡出</option></select>
            <input type="range" id="speed" min="300" max="2000" value="600" style="width:100%;">
        </div>
    </div>

    <div id="book-view" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:1000; padding:40px;">
        <div class="toolbar" style="display:flex; justify-content:center; gap:30px;">
            <button class="icon-btn" onclick="closeBook()"><i data-lucide="chevron-left"></i></button>
            <button class="icon-btn" onclick="deleteNotebook()"><i data-lucide="trash-2"></i></button>
            <button class="icon-btn" onclick="setPassword()"><i data-lucide="lock"></i></button>
            <button class="icon-btn" onclick="document.getElementById('file-upload').click()"><i data-lucide="plus"></i></button>
        </div>
        <input type="file" id="file-upload" multiple accept="image/*" style="display:none" onchange="handleFiles(this)">
        <div id="flipbook" style="width:800px; height:500px; margin:0 auto;"></div>
    </div>

    <script>
        lucide.createIcons();
        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }
        function renameGallery() { const n = prompt("輸入名稱：", document.getElementById('main-title').innerText); if(n) { document.getElementById('main-title').innerText = n; document.getElementById('album-name').innerText = n + " 的畫冊"; } }
        function openBook() { 
            document.getElementById('book-view').style.display = 'block'; 
            if(!$("#flipbook").data('turn')) $("#flipbook").turn({ width: 800, height: 500, autoCenter: true, gradients: true, duration: $('#speed').val()/100 });
        }
        function closeBook() { document.getElementById('book-view').style.display = 'none'; }
        function deleteNotebook() { if(confirm('確認？')) location.reload(); }
        function setPassword() { prompt("密碼："); }
        function updateColors() { updateGeom('split-v'); }
        function updateGeom(t) { 
            const r = document.documentElement; const p = document.getElementById('cp').value; const s = document.getElementById('cs').value;
            const g = { 'split-v': `linear-gradient(90deg, ${p} 50%, ${s} 50%)`, 'split-h': `linear-gradient(to bottom, ${p} 50%, ${s} 50%)`, 'diag': `linear-gradient(45deg, ${p} 50%, ${s} 50%)`, 'radial': `radial-gradient(circle, ${p} 40%, ${s} 100%)`, 'conic': `conic-gradient(${p}, ${s})`, 'stripes': `repeating-linear-gradient(45deg, ${p}, ${p} 10px, ${s} 10px, ${s} 20px)`, 'corner': `radial-gradient(circle at 0% 0%, ${p}, ${s})`, 'vert': `linear-gradient(to top, ${p} 30%, ${s} 70%)`, 'dots': `repeating-radial-gradient(circle, ${p}, ${p} 10px, ${s} 10px, ${s} 20px)`, 'check': `linear-gradient(135deg, ${p} 25%, ${s} 25%, ${s} 50%, ${p} 50%)` };
            r.style.setProperty('--geom', g[t]);
        }
        function handleFiles(input) { for(let f of input.files) { const r = new FileReader(); r.onload = (e) => { $("#flipbook").turn("addPage", $('<div class="page"><img src="'+e.target.result+'" style="width:100%"></div>')); }; r.readAsDataURL(f); } }
    </script>
</body>
</html>
