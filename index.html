<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Vivian's Gallery</title>
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4/turn.min.js"></script>
    <style>
        body { margin: 0; background: #e5e5e7; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* 讓書架在 iPad 上居中並放大 */
        #shelf { display: flex; justify-content: center; align-items: center; flex: 1; gap: 50px; }
        .notebook-cover { width: 220px; height: 300px; border-radius: 16px; cursor: pointer; box-shadow: 0 20px 40px rgba(0,0,0,0.2); background-size: cover; background-position: center; transition: 0.3s; }
        
        /* 全螢幕翻頁區 */
        #book-view { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: #fff; z-index: 100; }
        #flipbook { width: 100vw; height: 100vh; }
        #flipbook .page { width: 100%; height: 100%; background: white; display: flex; align-items: center; justify-content: center; }
        #flipbook .page img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .toolbar { position: absolute; top: 20px; z-index: 101; width: 100%; display: flex; justify-content: center; gap: 40px; }
        .action-link { cursor: pointer; color: #007aff; font-size: 18px; font-weight: 500; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div id="shelf">
        <div class="notebook-cover" style="background: linear-gradient(145deg, #4a3c31, #2e241d);" onclick="openBook()"></div>
    </div>

    <div id="book-view">
        <div class="toolbar">
            <span class="action-link" onclick="closeBook()">返回</span>
            <span class="action-link" onclick="deleteNotebook()" style="color:#ff3b30;">刪除</span>
            <span class="action-link" onclick="document.getElementById('file-upload').click()">新增</span>
        </div>
        <input type="file" id="file-upload" multiple accept="image/*" style="display:none" onchange="handleFiles(this)">
        <div id="flipbook">
            <div class="page" style="background:#fdf6e3;">封面</div>
        </div>
    </div>

    <script>
        function openBook() { 
            document.getElementById('book-view').style.display = 'block';
            if(!$("#flipbook").data('turn')) {
                $("#flipbook").turn({ width: $(window).width(), height: $(window).height(), autoCenter: true, gradients: true });
            }
        }
        function closeBook() { document.getElementById('book-view').style.display = 'none'; }
        function handleFiles(input) {
            for (let file of input.files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const page = $('<div class="page"><img src="' + e.target.result + '"></div>');
                    $("#flipbook").turn("addPage", page);
                }
                reader.readAsDataURL(file);
            }
        }
        function deleteNotebook() { if(confirm('確認移除？')) location.reload(); }
    </script>
</body>
</html>
