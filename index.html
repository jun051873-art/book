<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Vivian's Private Gallery</title>
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4/turn.min.js"></script>
    <style>
        body { background: #f5f5f7; font-family: -apple-system, sans-serif; margin: 0; padding: 40px; }
        #flipbook { width: 800px; height: 500px; margin: 50px auto; }
        #flipbook .page { background: white; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #flipbook .page img { width: 100%; height: 100%; object-fit: contain; }
        .toolbar { display: flex; gap: 30px; justify-content: center; padding: 20px; }
        .action-link { cursor: pointer; color: #007aff; font-size: 16px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="toolbar">
        <span class="action-link" onclick="document.getElementById('file-upload').click()">+ 新增作品</span>
    </div>
    
    <input type="file" id="file-upload" multiple accept="image/*" style="display:none" onchange="handleFiles(this)">
    
    <div id="flipbook">
        <div class="page" style="background:#4a3c31; color:white;">封面</div>
    </div>

    <script>
        $(window).ready(function() {
            $("#flipbook").turn({ width: 800, height: 500, autoCenter: true, gradients: true });
        });

        function handleFiles(input) {
            for (let file of input.files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const newPage = $('<div class="page"><img src="' + e.target.result + '"></div>');
                    $("#flipbook").turn("addPage", newPage);
                }
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
