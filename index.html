<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Vivian's Private Gallery</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --gold: #c5a059; --bg: #f8f8f8; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; padding: 40px; }
        
        /* 仿真封面：加入高級光影 */
        .notebook-cover { 
            width: 160px; height: 220px; border-radius: 20px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1), inset 0 0 10px rgba(255,255,255,0.5);
            background-size: cover; display: flex; align-items: center; justify-content: center;
        }
        
        /* 膠囊工具列：這是你截圖中的質感核心 */
        .toolbar { 
            display: flex; gap: 20px; padding: 12px 30px; background: rgba(255,255,255,0.9);
            border-radius: 50px; backdrop-filter: blur(15px); box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.3); margin-bottom: 40px;
        }
        .icon-btn { cursor: pointer; color: #555; background: none; border: none; transition: 0.3s; }
        .icon-btn:hover { color: var(--gold); }
        
        #book-view { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: #fff; z-index: 100; padding: 40px; }
    </style>
</head>
<body>

    <h1 style="font-weight: 700; color: #333; margin-bottom: 40px;">Vivian 的畫廊</h1>
    
    <div id="shelf"><div class="notebook-cover" style="background:linear-gradient(145deg, #4a3c31, #2e241d);" onclick="openBook()"></div></div>

    <div id="book-view">
        <div class="toolbar">
            <button class="icon-btn" onclick="closeBook()"><i data-lucide="chevron-left"></i></button>
            <button class="icon-btn" onclick="deleteNotebook()"><i data-lucide="trash-2"></i></button>
            <button class="icon-btn" onclick="setPassword()"><i data-lucide="lock"></i></button>
            <button class="icon-btn" onclick="document.getElementById('file-upload').click()"><i data-lucide="plus-circle"></i></button>
        </div>
        
        <input type="file" id="file-upload" multiple accept="image/*" style="display:none" onchange="handleFiles(this)">
        <div id="gallery" style="display:flex; overflow-x:auto; height:70vh; gap:20px;"></div>
    </div>

    <script>
        lucide.createIcons();
        function openBook() { document.getElementById('book-view').style.display = 'block'; }
        function closeBook() { document.getElementById('book-view').style.display = 'none'; }
        
        // 刪除二次確認
        function deleteNotebook() {
            if (confirm('此動作將永久刪除畫冊，是否確認？')) { 
                document.getElementById('shelf').innerHTML = ''; closeBook(); 
            }
        }
        
        // 自訂密碼邏輯
        function setPassword() {
            const p = prompt("請設定畫冊保護密碼：");
            if (p) alert("密碼已鎖定，下次開啟需驗證。");
        }

        function handleFiles(input) {
            const gallery = document.getElementById('gallery');
            for (let file of input.files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.style.position = "relative";
                    div.innerHTML = `<img src="${e.target.result}" style="height:100%; object-fit:contain;">`;
                    gallery.appendChild(div);
                }
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
